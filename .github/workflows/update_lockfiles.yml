name: Update lockfiles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfiles:
    name: Refresh mix.lock files (${{ matrix.bucket }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Each project's mix.exs picks its lockfile based on the running Elixir
        # version (see `lockfile/1` in mix.exs), so one Elixir version per
        # supported range is needed to refresh every lockfile bucket.
        include:
          - bucket: "1.13-1.14"
            elixir: "1.13"
            otp: "25.3"
          - bucket: "1.15-1.17"
            elixir: "1.17"
            otp: "26.2"
          - bucket: "default"
            elixir: "1.18"
            otp: "27.2"

    steps:
      - name: Check out this repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Refresh lockfiles
        id: refresh
        run: |
          if [ "${{ matrix.bucket }}" = "default" ]; then
            suffix="mix.lock"
          else
            suffix="mix-${{ matrix.bucket }}.lock"
          fi

          # Only refresh lockfiles that already exist and target this bucket -
          # not every project has (or needs) a dedicated lockfile per range.
          mapfile -t lockfiles < <(git ls-files -- "$suffix" "test_integrations/*/$suffix")

          for lock in "${lockfiles[@]}"; do
            dir=$(dirname "$lock")
            echo "==> Refreshing $lock in $dir"
            (cd "$dir" && mix deps.update --all)
          done

          {
            echo "paths<<LOCKFILES_EOF"
            printf '%s\n' "${lockfiles[@]}"
            echo "LOCKFILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload updated lockfiles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lockfiles-${{ matrix.bucket }}
          path: ${{ steps.refresh.outputs.paths }}
          if-no-files-found: error

  create-pr:
    name: Create pull request
    needs: update-lockfiles
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Get auth token
        id: token
        uses: actions/create-github-app-token@5d869da34e18e7287c1daad50e0b8ea0f506ce69 # v1.11.0
        with:
          app-id: ${{ vars.SENTRY_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SENTRY_RELEASE_BOT_PRIVATE_KEY }}

      - name: Check out this repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.token.outputs.token }}

      - name: Download updated lockfiles
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: lockfiles-*
          merge-multiple: true

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create branch
        id: create-branch
        run: |
          # Stage first, then diff the index against HEAD: plain `git diff` ignores
          # untracked files, so a brand-new project's lock would look unchanged.
          mapfile -t lockfiles < <(git ls-files -- 'mix.lock' 'mix-*.lock' 'test_integrations/*/mix.lock' 'test_integrations/*/mix-*.lock')
          git add "${lockfiles[@]}"

          if git diff --cached --quiet; then
            echo "No lockfile changes; nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_TITLE="chore(deps): Refresh mix.lock files"
          BRANCH_NAME="deps/lockfiles-update-$(date +%Y-%m-%d)"

          git checkout -B "$BRANCH_NAME"
          git commit -m "$COMMIT_TITLE"
          git push origin "$BRANCH_NAME" --force

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "commit_title=$COMMIT_TITLE" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.create-branch.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
          COMMIT_TITLE: ${{ steps.create-branch.outputs.commit_title }}
        with:
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const branchName = process.env.BRANCH_NAME;
            const commitTitle = process.env.COMMIT_TITLE;
            const prBody = `Automated weekly refresh of the committed \`mix.lock\` files (including the per-Elixir-version-range lockfiles) via \`mix deps.update --all\`, keeping dependency pins current with the latest security patches allowed by each project's version constraints.

            #skip-changelog

            ## Action required
            - If CI passes on this PR, it's safe to approve and merge.
            - If CI fails, a dependency update broke something — investigate before merging.

            _🤖 Automatically created by [.github/workflows/update_lockfiles.yml](https://github.com/getsentry/sentry-elixir/blob/master/.github/workflows/update_lockfiles.yml)._`.replace(/^ {12}/gm, '');

            // Close superseded lockfile PRs — they're now obsolete.
            const existingPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const pr of existingPRs) {
              if (pr.head.ref.startsWith('deps/lockfiles-update-')) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
              }
            }

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: commitTitle,
              head: branchName,
              base: 'master',
              body: prBody,
            });
